services:
  app:
    build:
      context: .
      additional_contexts:
        modules: ../Base
      dockerfile: docker/php/Dockerfile
      target: production
    image: texture:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: texture
      DB_USERNAME: texture_user
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - laravel

  queue:
    image: texture:latest
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: texture
      DB_USERNAME: texture_user
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - laravel

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks:
      - laravel

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: texture
      POSTGRES_USER: texture_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U texture_user -d texture"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - laravel

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  laravel:
    driver: bridge
