services:
  app:
    build:
      context: .
      additional_contexts:
        modules: ../Base
      dockerfile: docker/php/Dockerfile
      target: production
    image: texture:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: texture
      DB_USERNAME: texture_user
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - laravel

  queue:
    image: texture:latest
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: texture
      DB_USERNAME: texture_user
      DB_PASSWORD: ${DB_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - laravel

  nginx:
    build:
      context: .
      additional_contexts:
        modules: ../Base
      dockerfile: docker/php/Dockerfile
      target: nginx
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - laravel

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    networks:
      - laravel

volumes:
  caddy_data:
  caddy_config:

networks:
  laravel:
    driver: bridge
