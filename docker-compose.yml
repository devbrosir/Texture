services:
    app: &laravel-service
        build:
            context: .
            additional_contexts:
                modules: ../Base
            dockerfile: docker/php/Dockerfile
        image: texture:latest
        restart: unless-stopped
        working_dir: /var/www/html
        environment:
            DB_CONNECTION: pgsql
            DB_HOST: postgres
            DB_PORT: 5432
            DB_DATABASE: texture
            DB_USERNAME: texture_user
            DB_PASSWORD: ${DB_PASSWORD:-texture}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - laravel

    queue:
        <<: *laravel-service
        command: php artisan queue:work --tries=3 --timeout=120 --sleep=3
        container_name: laravel_queue

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - laravel

    postgres:
        image: postgres:18-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: texture
            POSTGRES_USER: texture_user
            POSTGRES_PASSWORD: ${DB_PASSWORD:-texture}
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U texture_user -d texture"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - laravel

volumes:
    postgres_data:

networks:
    laravel:
        driver: bridge
