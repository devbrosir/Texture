services:
    app:
        build:
            context: .
            additional_contexts:
                modules: ../Base
            dockerfile: docker/php/Dockerfile
        image: texture-php
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - ../Base:/var/www/Base
        depends_on:
            - postgres
        networks:
            - laravel
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=texture
            - DB_USERNAME=texture_user
            - DB_PASSWORD=texture

    queue:
        image: texture-php
        command: php artisan queue:work --tries=3 --timeout=120
        volumes:
            - .:/var/www/html
        depends_on:
            - postgres
        networks:
            - laravel
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=texture
            - DB_USERNAME=texture_user
            - DB_PASSWORD=texture

    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel

    postgres:
        image: postgres:18-alpine
        container_name: laravel_postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: texture
            POSTGRES_USER: texture_user
            POSTGRES_PASSWORD: texture
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - laravel

volumes:
    postgres_data:

networks:
    laravel:
        driver: bridge
